<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0b1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(83,74,183,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(29,158,117,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(55,138,221,0.08) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0.4;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.4); }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(127,119,221,0.3);
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 0 80px rgba(83,74,183,0.15), 0 0 0 1px rgba(255,255,255,0.04) inset;
    text-align: center;
    backdrop-filter: blur(12px);
  }

  .badge {
    display: inline-block;
    background: rgba(83,74,183,0.25);
    border: 1px solid rgba(127,119,221,0.5);
    color: #CECBF6;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1.2rem;
    font-family: 'Space Mono', monospace;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
  }

  h1 span {
    background: linear-gradient(135deg, #7F77DD, #5DCAA5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    margin-bottom: 1.8rem;
    letter-spacing: 0.05em;
  }

  .svg-wrap {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(127,119,221,0.2);
    border-radius: 16px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .svg-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(127,119,221,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .svg-wrap svg {
    width: 100%;
    height: auto;
    display: block;
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 100px;
    padding: 12px 24px;
    border: none;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #534AB7, #1D9E75);
    color: #ffffff;
    box-shadow: 0 4px 20px rgba(83,74,183,0.4);

  .btn-secondary {

    color: rgba(255,255,255,0.7);

    border-radius: 50%;

  .toast {

    border: 1px solid rgba(93,202,165,0.4);
    white-space: nowrap;
  }

  #progress {

    font-size: 11px;
    color: #7F77DD;

  }
</style>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function downloadSVG() {
    const svg = document.getElementById('octocat-svg');
    const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'quantum-o-cat.svg'; a.click();
    URL.revokeObjectURL(url);
    showToast('✅ SVG downloaded!');
  }

  function downloadPNG() {
    const svg = document.getElementById('octocat-svg');
    const progress = document.getElementById('progress');
    progress.style.display = 'block';
    progress.textContent = 'Rendering PNG...';

    const canvas = document.createElement('canvas');
    canvas.width = 1360; canvas.height = 1560;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0d0b1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'quantum-o-cat.png';
        a.click();
        progress.style.display = 'none';
        showToast('✅ PNG downloaded at 2× resolution!');
      }, 'image/png');
    };
    img.onerror = () => { progress.textContent = 'Try SVG download instead.'; };
    img.src = url;
  }
</script>
